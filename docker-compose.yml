services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./backend:/app # For development: syncs code changes without rebuild
    # Avoid syncing the model_cache to keep the host machine clean
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

